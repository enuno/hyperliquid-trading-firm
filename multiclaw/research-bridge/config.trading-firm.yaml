# research-bridge — Active Trading Firm Config
# Copy of config.trading-firm.example.yaml with deployment values filled in.
# DO NOT commit real API keys, private key paths, or wallet addresses.
# Secrets are injected at runtime via K8s Secrets or .env (gitignored).
#
# To get started:
#   cp config.trading-firm.example.yaml config.trading-firm.yaml
#   bash scripts/validate_bridge.sh

# ─── LLM Backend ────────────────────────────────────────────────────────────
llm:
  # ACP mode: routes all 23 pipeline stages through the running OpenClaw agent.
  # No separate LLM API key required. Recommended for all production research jobs.
  provider: "acp"
  acp:
    agent: "openclaw"
    cwd: "."

  # Uncomment to use a dedicated LLM instead of ACP (e.g., for nightly digest
  # jobs running off-peak on a separate worker node).
  # provider: "anthropic"
  # api_key_env: "RESEARCH_LLM_KEY"   # injected via K8s Secret; never hardcode
  # model: "claude-sonnet-4-20250514"
  # max_tokens: 8192

# ─── Experiment Execution ───────────────────────────────────────────────────
experiment:
  # simulated: no code execution; safe for all crypto, strategy, and project topics.
  # sandbox:   Docker-isolated code execution; required for COMPETITIVE_BACKTEST mode only.
  mode: "simulated"

  # Maximum AutoResearchClaw pipeline stages to run in parallel.
  # Lower this on memory-constrained nodes (16 GB RAM: use 2).
  max_concurrent_stages: 4

  # Timeout per stage in seconds. Increase for slow LLM backends.
  stage_timeout_seconds: 300

  # Docker image for sandbox mode. Ignored when mode = "simulated".
  sandbox_image: "autorc-sandbox:latest"

# ─── Output & Artifacts ─────────────────────────────────────────────────────
output:
  # Supported: "json", "pdf", "json+pdf", "tex+pdf"
  # json+pdf is recommended: JSON feeds the output_parser; PDF feeds the dashboard.
  format: "json+pdf"

  # Artifact root. All job outputs land under <directory>/<job-id>/
  # Path is relative to the repo root.
  directory: "../../logs/research/artifacts"

  # Preserve intermediate stage outputs for debugging (increases disk usage).
  keep_intermediate: false

  # LaTeX compiler for PDF generation. Requires texlive-full.
  # Set to null to skip PDF generation (JSON only).
  latex_compiler: "pdflatex"

# ─── Quality & Scoring ──────────────────────────────────────────────────────
quality:
  # Minimum AutoResearchClaw quality score (0–5) to accept a completed job.
  # Default upstream value is 2.0; 3.5 is appropriate for crypto/strategy topics
  # where primary source availability is lower than traditional academic fields.
  min_score: 3.5

  # Reject jobs that cite fewer than this many unique sources.
  min_sources: 5

  # Warn (do not reject) if the paper cites any source with a fabricated URL.
  # The Stage 5 human gate is the primary fabrication control; this is a backstop.
  warn_on_unverified_urls: true

# ─── Search & Literature Sources ────────────────────────────────────────────
search:
  # Sources natively supported by AutoResearchClaw v0.3.x.
  # Crypto-native sources (Messari, DeFiLlama, Token Terminal, Dune) are NOT
  # natively supported. Pre-process those via context_injector.py before invocation.
  sources:
    - arxiv
    - semantic_scholar
    - openAlex

  # Maximum papers to retrieve per source per job.
  max_papers_per_source: 30

  # arXiv category filters (applied when topic context includes "arxiv" source).
  arxiv_categories:
    - "q-fin.TR"   # Trading and market microstructure
    - "q-fin.PM"   # Portfolio management
    - "q-fin.CP"   # Computational finance
    - "cs.LG"      # Machine learning
    - "cs.AI"      # Artificial intelligence
    - "econ.GN"    # General economics

  # Request delay between search API calls (seconds). Increase if hitting 429s.
  rate_limit_delay: 1.5

# ─── Human Approval Gates ───────────────────────────────────────────────────
gates:
  # Stage 5  — Literature quality review. Always active for DEEP and PROJECT_AUDIT.
  # Stage 9  — Experiment design review. Always active for DEEP and COMPETITIVE_BACKTEST.
  # Stage 20 — Final quality review. Always active for DEEP and PROJECT_AUDIT.
  #
  # Per-mode gate matrix (true = gate active, false = auto-approved):
  #
  #                      stage_5  stage_9  stage_20
  #   DEEP                 true     true     true
  #   STRATEGY_SCAN        true     false    false
  #   PROJECT_AUDIT        true     true     true
  #   COMPETITIVE_BACKTEST false    true     false
  #   NIGHTLY_DIGEST       false    false    false
  #
  # Override individual gates per mode below. Removing an entry restores the
  # matrix default. Setting any production gate to false requires a comment
  # explaining the business justification.
  overrides: {}

  # Timeout for a human gate response (seconds). Job is paused until response
  # or timeout. On timeout, job is moved to WAITING_GATE state (not failed).
  gate_timeout_seconds: 86400   # 24 hours

  # Notification channel for gate-pending alerts.
  # Supported: "log" (stdout only), "webhook", "slack" (requires SLACK_WEBHOOK_URL env)
  gate_notify: "log"
  # gate_notify: "slack"
  # gate_notify_webhook_env: "RESEARCH_GATE_WEBHOOK_URL"

# ─── Bridge — Firm Context Integration ──────────────────────────────────────
bridge:
  # Path to the RL buffer export JSON written by apps/jobs/rl_execution_trainer.py.
  # Used by context_injector.py to embed recent experiment performance in topic prompts.
  # Set to null to disable RL context injection.
  rl_buffer_export_path: "../../logs/rl_buffer_export.json"

  # Path to the backtest history SQLite database.
  backtest_history_path: "../../logs/experiments.sqlite"

  # Number of recent experiments to include in injected context.
  rl_context_lookback: 20

  # SQLite registry of all research jobs run by this bridge instance.
  registry_path: "../../logs/research/research_registry.db"

  # Maximum token budget for injected firm context per research job.
  # context_injector.py will truncate to this limit before calling researchclaw.
  max_context_tokens: 4000

  # Block any artifact write to paths outside output.directory.
  # Never set to false in production.
  artifact_guard: true

  # Scrub these env var names from all injected context before passing to the pipeline.
  # Add any secret env var names used in your deployment.
  scrub_env_vars:
    - HL_PRIVATE_KEY
    - VAULT_SUBACCOUNT_ADDRESS
    - RESEARCH_LLM_KEY
    - RESEARCH_GATE_WEBHOOK_URL
    - SLACK_WEBHOOK_URL
    - DATABASE_URL
    - REDIS_URL
    - MLFLOW_TRACKING_URI

# ─── Prompt Templates ───────────────────────────────────────────────────────
templates:
  # Directory containing YAML prompt templates used by context_injector.py.
  directory: "./prompt_templates"

  # Active templates. Keys are ResearchMode values; values are template filenames.
  active:
    strategy_scan: "strategy_evaluation.yaml"
    project_audit: "crypto_project_scan.yaml"
    deep: "strategy_evaluation.yaml"         # override per-invocation as needed
    competitive_backtest: "strategy_evaluation.yaml"
    nightly_digest: "market_structure.yaml"

# ─── Research Registry ──────────────────────────────────────────────────────
registry:
  # Fields written to research_registry.db for each job.
  # Do not remove fields; add new fields as nullable columns only.
  schema_version: 1

  # Retention policy: delete artifact directories for jobs older than N days.
  # Set to 0 to retain all artifacts indefinitely.
  artifact_retention_days: 90

  # Export a JSON summary of the registry on each job completion.
  # Useful for dashboard polling without direct SQLite access.
  export_summary_json: true
  summary_path: "../../logs/research/registry_summary.json"

# ─── Observability ──────────────────────────────────────────────────────────
observability:
  # Log level for research-bridge components.
  # Inherited by context_injector, output_parser, and research_agent.
  log_level: "INFO"   # DEBUG | INFO | WARNING | ERROR

  # Emit structured JSON logs (recommended for production; consumed by the
  # firm's central logging stack).
  structured_logs: true

  # Append a research_bridge_events entry to the firm's audit log on each
  # job state transition (QUEUED → RUNNING → GATE_PENDING → COMPLETE | FAILED).
  audit_log_path: "../../logs/audit.jsonl"

  # MLflow experiment name for research job tracking.
  # Requires MLFLOW_TRACKING_URI env var to be set.
  # Set to null to disable MLflow integration.
  mlflow_experiment: null
  # mlflow_experiment: "research-bridge"
